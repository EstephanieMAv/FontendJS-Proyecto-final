<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Semi+Condensed:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Mi pagina de TT</title>
  </head>
  <body>
    <header>
      <div class="logo-container">
        <a href="../index.html">
          <img src="../images/HOMErashadAbdulov.png" alt="icono" width="50" />
        </a>
      </div>
      </div>

      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="contacto.html">Contacto</a></li>
          <li>
            <a href="carrito.html"
              ><img
                src="../images/CARRITOimaginatonlol.png"
                alt="Carrito"
                width="40"
            /><span id="contador-carrito">0</span></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-contacto">
      <section class="text">
        <h1 class="titulo-home text-secondary">Página de contacto</h1>
        <p>
          A continuacion si desea comunicarse con nosotros puede realizar el
          formulario y enviarlo. Nos pondremos en contacto lo más pronto
          posible.
        </p>
      </section>

      <section>
        <form
          class="form-contacto"
          action="https://formspree.io/f/xdapypzd"
          method="POST"
        >
          <label class="form__label">
            Tu nombre:
            <input type="text" name="nombre" />
          </label>
          <label class="form__label">
            Tu email:
            <input type="email" name="email" />
          </label>
          <label class="form__label">
            Tu mensaje:
            <textarea class="form__textarea" name="message"></textarea>
          </label>
          <!-- Campo para la redirección -->
          <input
            type="hidden"
            name="_redirect"
            value="https://tusitio.com/gracias.html"
          />
          <!-- your other form fields go here -->
          <button class="form__button btn color-primario" type="submit">
            Enviar
          </button>
          <button class="btn danger" type="reset">Limpiar</button>
        </form>
        <br />
      </section>
    </main>

        <script src="./js/contacto.js" type="module"></script>

    <footer>
      <p id="titulo-footer">

      <nav>

            ></a>
          </li>
          <li>
            <img src="../images/comercio-justo.png" alt="logo de comercio" /><a
              href="https://www.tiendanube.com/login"
            ></a>
          </li>
        </ul>
      </nav>
    </footer>

  </body>
</html>
